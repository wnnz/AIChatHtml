    function appendMessage(role, text, options = {}) {
      const {
        attachments = [],
        withTimestamp = true,
        metaText = "",
        timestampText = ""
      } = options;
      const resolvedTimestamp = withTimestamp ? (timestampText || new Date().toLocaleTimeString()) : "";
      refs.emptyState.style.display = "none";
      const item = document.createElement("article");
      item.className = `message ${role}`;

      const head = document.createElement("div");
      head.className = "message-head";
      const roleLabel = document.createElement("span");
      roleLabel.textContent = role === "user" ? "User" : role === "assistant" ? "Assistant" : "System";
      head.appendChild(roleLabel);

      if (withTimestamp) {
        const time = document.createElement("span");
        time.textContent = resolvedTimestamp;
        head.appendChild(time);
      }

      const body = document.createElement("div");
      body.className = "message-body";

      if (text) {
        const textBlock = document.createElement("div");
        textBlock.textContent = text;
        body.appendChild(textBlock);
      }

      if (attachments.length) {
        const imageList = document.createElement("div");
        imageList.className = "message-images";

        attachments.forEach((attachment) => {
          const link = document.createElement("a");
          link.className = "message-image-link";
          link.href = attachment.dataUrl;
          link.target = "_blank";
          link.rel = "noreferrer";
          link.title = attachment.name || "查看图片";

          const image = document.createElement("img");
          image.className = "message-image";
          image.src = attachment.dataUrl;
          image.alt = attachment.name || "聊天图片";

          link.appendChild(image);
          imageList.appendChild(link);
        });

        body.appendChild(imageList);
      }

      item.appendChild(head);
      item.appendChild(body);

      if (metaText) {
        const meta = document.createElement("div");
        meta.className = "message-meta";
        meta.textContent = metaText;
        item.appendChild(meta);
      }

      refs.messages.appendChild(item);
      refs.messages.scrollTop = refs.messages.scrollHeight;
      scheduleCustomScrollbarSync();
      return resolvedTimestamp;
    }

    function appendLoadingMessage() {
      const resolvedTimestamp = new Date().toLocaleTimeString();
      refs.emptyState.style.display = "none";

      const item = document.createElement("article");
      item.className = "message assistant is-loading";

      const head = document.createElement("div");
      head.className = "message-head";

      const roleLabel = document.createElement("span");
      roleLabel.textContent = "Assistant";
      head.appendChild(roleLabel);

      const time = document.createElement("span");
      time.textContent = resolvedTimestamp;
      head.appendChild(time);

      const body = document.createElement("div");
      body.className = "message-body";
      const textBlock = document.createElement("div");
      textBlock.hidden = true;

      const loading = document.createElement("div");
      loading.className = "loading-dots";
      loading.setAttribute("role", "status");
      loading.setAttribute("aria-label", "正在生成回复");

      for (let index = 0; index < 3; index += 1) {
        const dot = document.createElement("span");
        dot.className = "loading-dot";
        dot.setAttribute("aria-hidden", "true");
        loading.appendChild(dot);
      }

      body.appendChild(textBlock);
      body.appendChild(loading);
      item.appendChild(head);
      item.appendChild(body);

      let meta = null;

      const syncScroll = () => {
        refs.messages.scrollTop = refs.messages.scrollHeight;
        scheduleCustomScrollbarSync();
      };

      const setText = (text) => {
        const nextText = typeof text === "string" ? text : "";
        textBlock.textContent = nextText;
        textBlock.hidden = !nextText;

        if (nextText) {
          if (loading.isConnected) {
            loading.remove();
          }
          item.classList.remove("is-loading");
        } else if (!loading.isConnected) {
          body.appendChild(loading);
          item.classList.add("is-loading");
        }

        syncScroll();
      };

      const setMeta = (metaText) => {
        const nextMeta = typeof metaText === "string" ? metaText.trim() : "";

        if (!nextMeta) {
          if (meta) {
            meta.remove();
            meta = null;
            syncScroll();
          }
          return;
        }

        if (!meta) {
          meta = document.createElement("div");
          meta.className = "message-meta";
          item.appendChild(meta);
        }

        meta.textContent = nextMeta;
        syncScroll();
      };

      refs.messages.appendChild(item);
      syncScroll();

      return {
        element: item,
        timestamp: resolvedTimestamp,
        getText() {
          return textBlock.textContent || "";
        },
        setText,
        setMeta,
        finalize(options = {}) {
          if (Object.prototype.hasOwnProperty.call(options, "text")) {
            setText(options.text);
          } else if (loading.isConnected) {
            loading.remove();
            item.classList.remove("is-loading");
            syncScroll();
          }

          if (Object.prototype.hasOwnProperty.call(options, "metaText")) {
            setMeta(options.metaText);
          }
        },
        remove() {
          item.remove();
          scheduleCustomScrollbarSync();
        }
      };
    }

    function renderModelOptions(models) {
      refs.modelMenu.replaceChildren();

      if (!models.length) {
        state.selectedModel = "";
        const empty = document.createElement("div");
        empty.className = "model-option-empty";

        refs.modelMenu.appendChild(empty);

        const main = document.createElement("div");
        main.className = "model-option-main";

        const label = document.createElement("span");

    function buildConversationInput(prompt, attachments = state.pendingAttachments) {
      const items = state.conversation.map((message) => ({
        role: message.role,
        content: buildMessageContent(message.content, cloneAttachments(message.attachments))
      })).filter((message) => {
        return Array.isArray(message.content) ? message.content.length > 0 : Boolean(message.content);
      });

      items.push({
        role: "user",
        content: buildMessageContent(prompt, cloneAttachments(attachments))
      });

      return items;
    }

    function extractErrorMessage(payload, fallbackMessage = "请求失败") {
      if (!payload) {
        return fallbackMessage;
      }

      return typeof payload?.error?.message === "string"
        ? payload.error.message
        : typeof payload?.message === "string"
          ? payload.message
          : typeof payload?.raw === "string"
            ? payload.raw
            : fallbackMessage;
    }

    function parseSseEventBlock(block) {
      const lines = block.replace(/\r/g, "").split("\n");
      let eventName = "";
      const dataLines = [];

      lines.forEach((line) => {
        if (!line || line.startsWith(":")) {
          return;
        }

        if (line.startsWith("event:")) {
          eventName = line.slice(6).trim();
          return;
        }

        if (line.startsWith("data:")) {
          dataLines.push(line.slice(5).trimStart());
        }
      });

      return {
        event: eventName,
        data: dataLines.join("\n")
      };
    }

    function extractStreamTextDelta(payload) {
      if (!payload) {
        return "";
      }

      if (typeof payload.delta === "string") {
        return payload.delta;
      }

      if (typeof payload.text === "string" && payload.type === "response.output_text.delta") {
        return payload.text;
      }

      const choiceDelta = payload?.choices?.[0]?.delta?.content;
      if (typeof choiceDelta === "string") {
        return choiceDelta;
      }

      if (Array.isArray(choiceDelta)) {
        return choiceDelta.map((item) => {
          if (typeof item === "string") {
            return item;
          }

          return typeof item?.text === "string" ? item.text : "";
        }).join("");
      }

      return "";
    }

    async function readResponseStream(response, options = {}) {
      const { onText } = options;

      if (!response.body) {
        throw new Error("当前响应不支持流式读取。");
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";
      let text = "";
      let completedPayload = null;

      const applyEvent = (eventBlock) => {
        const parsedEvent = parseSseEventBlock(eventBlock);
        if (!parsedEvent.data) {
          return;
        }

        if (parsedEvent.data === "[DONE]") {
          return;
        }

        let payload = null;
        try {
          payload = JSON.parse(parsedEvent.data);
        } catch (error) {
          return;
        }

        const eventType = payload?.type || parsedEvent.event || "";

        if (eventType === "error" || eventType === "response.failed") {
          throw new Error(extractErrorMessage(payload?.response || payload, "流式响应失败。"));
        }

        const delta = extractStreamTextDelta(payload);
        if (delta && (!eventType || eventType.includes("delta"))) {
          text += delta;
          onText?.(text, payload);
        }

        if (eventType === "response.output_text.done" && typeof payload.text === "string" && payload.text) {
          if (payload.text !== text) {
            text = payload.text;
            onText?.(text, payload);
          }
        }

        if (eventType === "response.completed") {
          completedPayload = payload?.response || payload?.data || payload;
          if (!text) {
            const finalText = extractResponseText(completedPayload);
            if (finalText) {
              text = finalText;
              onText?.(text, payload);
            }
          }
        }
      };

      while (true) {
        const { value, done } = await reader.read();
        buffer += decoder.decode(value || new Uint8Array(), { stream: !done });

        let boundaryMatch = buffer.match(/\r?\n\r?\n/);
        while (boundaryMatch) {
          const boundaryIndex = boundaryMatch.index ?? -1;
          if (boundaryIndex < 0) {
            break;
          }

          const block = buffer.slice(0, boundaryIndex);
          buffer = buffer.slice(boundaryIndex + boundaryMatch[0].length);
          applyEvent(block);
          boundaryMatch = buffer.match(/\r?\n\r?\n/);
        }

        if (done) {
          const tail = buffer.trim();
          if (tail) {
            applyEvent(tail);
          }
          break;
        }
      }

      return {
        text,
        payload: completedPayload
      };
    }

    async function readJsonOrThrow(response) {
      const text = await response.text();
      let data = null;

      if (text) {
        try {
          data = JSON.parse(text);
        } catch (error) {
          data = { raw: text };
        }
      }

      if (!response.ok) {
        throw new Error(extractErrorMessage(data, `HTTP ${response.status}`));
      }

      return data;
    }

    function extractModels(payload) {
      if (!payload) {
        return [];
      }

      if (Array.isArray(payload.data)) {
        return payload.data
          .map((item) => item?.id || item?.name || item?.model)
          .filter((item) => typeof item === "string" && item.trim());
      }

      return [];
    }

    function extractResponseText(payload) {
      if (!payload) {
        return "";
      }

      if (typeof payload.output_text === "string" && payload.output_text.trim()) {
        return payload.output_text.trim();
      }

      const fragments = [];
      const collectText = (value) => {
        if (!value) {
          return;
        }

        if (typeof value === "string") {
          const trimmed = value.trim();
          if (trimmed) {
            fragments.push(trimmed);
          }
          return;
        }

        if (Array.isArray(value)) {
          value.forEach(collectText);
          return;
        }

        if (typeof value !== "object") {
          return;
        }

        if (typeof value.text === "string") {
          collectText(value.text);
        }

        if (typeof value.output_text === "string") {
          collectText(value.output_text);
        }

        if (typeof value.content === "string") {
          collectText(value.content);
        }

        if (Array.isArray(value.content)) {
          collectText(value.content);
        }
      };

      collectText(payload.output);
      collectText(payload.choices?.[0]?.message?.content);
      collectText(payload.choices?.[0]?.text);

      return fragments.join("\n\n").trim();
    }

    async function validateApiKey(apiKey) {
      const response = await fetch(`${API_BASE}/v1/models`, {
        headers: {
          Authorization: `Bearer ${apiKey}`
        },
        cache: "no-store"
      });

      return readJsonOrThrow(response);
    }

    async function unlock() {
      const apiKey = refs.apiKeyInput.value.trim();
      if (!apiKey) {
        setStatus(refs.authStatus, "请先输入 API Key。", "error");
        return;
      }

      setBusy(true);
      setStatus(refs.authStatus, "正在校验 Key 并拉取模型列表...");

      try {
        const payload = await validateApiKey(apiKey);
        const models = extractModels(payload);
        state.apiKey = apiKey;
        state.models = models;
        state.unlocked = true;
        renderModelOptions(models);
        restoreSessionsAfterUnlock();
        setStatus(refs.authStatus, "校验成功，正在进入聊天界面...", "success");
        setAuthGateVisible(false);
        updateSessionSummary();
        storeApiKey(apiKey);
        setStatus(refs.composerStatus, "");
        refs.messageInput.focus();
      } catch (error) {
        state.apiKey = "";
        state.models = [];
        state.selectedModel = "";
        state.lastTokenUsageText = "";
        state.unlocked = false;
        renderModelOptions([]);
        updateModelUsage();
        updateSessionSummary();
        setAuthGateVisible(true);
        setStatus(refs.authStatus, `校验失败：${error.message}`, "error");
      } finally {
        setBusy(false);
      }
    }

    async function sendMessage() {
      if (!state.unlocked || state.busy) {
        return;
      }

      const model = state.selectedModel.trim();
      const prompt = refs.messageInput.value.trim();
      const instructions = refs.systemPromptInput.value.trim();
      const attachments = cloneAttachments(state.pendingAttachments);

      if (!model) {
        setStatus(refs.composerStatus, "请先选择模型。", "error");
        refs.modelTrigger.focus();
        return;
      }

      if (!prompt && !attachments.length) {
        setStatus(refs.composerStatus, "请输入消息或添加图片。", "error");
        refs.messageInput.focus();
        return;
      }

      const payload = {
        model,
        input: buildConversationInput(prompt, attachments),
        stream: true
      };

      if (instructions) {
        payload.instructions = instructions;
      }

      const startedAt = performance.now();
      const userTimestamp = appendMessage("user", prompt, {
        attachments
      });
      const assistantMessage = appendLoadingMessage();
      refs.messageInput.value = "";
      syncMessageInputHeight({ collapse: true });
      clearPendingAttachments();
      setBusy(true);
      updateSessionSummary();
      setStatus(refs.composerStatus, "");

      try {
        const response = await fetch(`${API_BASE}/v1/responses`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Accept: "text/event-stream, application/json",
            Authorization: `Bearer ${state.apiKey}`
          },
          body: JSON.stringify(payload)
        });

        let data = null;
        let text = "";
        const contentType = response.headers.get("content-type") || "";
        const isEventStream = contentType.includes("text/event-stream");

        if (!response.ok) {
          if (isEventStream) {
            try {
              await readResponseStream(response, {
                onText(nextText) {
                  assistantMessage.setText(nextText);
                }
              });
            } catch (error) {
              throw error;
            }

            throw new Error(`HTTP ${response.status}`);
          }

          await readJsonOrThrow(response);
        }

        if (isEventStream) {
          const streamResult = await readResponseStream(response, {
            onText(nextText) {
              assistantMessage.setText(nextText);
            }
          });

          data = streamResult.payload;
          text = streamResult.text;
        } else {
          data = await readJsonOrThrow(response);
          text = extractResponseText(data);
        }

        if (!text) {
          throw new Error("响应成功，但没有解析到文本内容。请检查 sub2api 的 response 返回格式。");
        }

        state.conversation.push({
          role: "user",
          content: prompt,
          attachments,
          timestamp: userTimestamp,
          meta: ""
        });
        state.lastTokenUsageText = "";
        updateModelUsage();
        const assistantMeta = buildAssistantMeta(performance.now() - startedAt, data);
        assistantMessage.finalize({
          text,
          metaText: assistantMeta
        });
        state.conversation.push({
          role: "assistant",
          content: text,
          timestamp: assistantMessage.timestamp,
          meta: assistantMeta
        });
        saveCurrentSession(true);
        updateSessionSummary();
        setStatus(refs.composerStatus, "");
      } catch (error) {
        if (assistantMessage.getText()) {
          assistantMessage.finalize({
            metaText: "响应中断"
          });
        } else {
          assistantMessage.remove();
        }
        appendMessage("system", `请求失败：${error.message}`);
        setStatus(refs.composerStatus, `请求失败：${error.message}`, "error");
      } finally {
        setBusy(false);
      }
    }

    function logout() {
      clearStoredApiKey();
      state.apiKey = "";
      state.models = [];
      state.selectedModel = "";
      state.conversation = [];
      state.lastTokenUsageText = "";
      state.unlocked = false;
      refs.apiKeyInput.value = "";
      refs.messageInput.value = "";
      syncMessageInputHeight({ collapse: true });
      clearPendingAttachments();
      renderModelOptions([]);
      updateModelUsage();
      setAuthGateVisible(true);
      refs.messages.replaceChildren(refs.emptyState);
      refs.emptyState.style.display = "grid";
      setStatus(refs.authStatus, "已退出，请重新输入 API Key。");
      setStatus(refs.composerStatus, "");
      updateSessionSummary();
      setBusy(false);
      refs.apiKeyInput.focus();
    }

    refs.unlockButton.addEventListener("click", unlock);
    refs.sidebarToggle.addEventListener("click", () => {
      setSidebarOpen(!refs.body.classList.contains("sidebar-open"));
    });
    refs.siderBackdrop.addEventListener("click", () => {
      setSidebarOpen(false);
    });
    refs.themeToggle.addEventListener("click", toggleTheme);
    refs.newSessionButton.addEventListener("click", startNewSession);
    refs.clearSessionsButton.addEventListener("click", clearAllSessions);
    refs.mobileNewSessionButton.addEventListener("click", startNewSession);
    refs.sessionList.addEventListener("click", (event) => {
      const actionButton = event.target.closest("button[data-session-action][data-session-id]");
      if (actionButton) {
        const { sessionAction, sessionId } = actionButton.dataset;
        if (sessionAction === "rename") {
          renameSession(sessionId);
        } else if (sessionAction === "delete") {
          deleteSession(sessionId);
        }
        return;
      }

      const menuToggle = event.target.closest("button[data-session-menu-toggle][data-session-id]");
      if (menuToggle) {
        toggleSessionMenu(menuToggle.dataset.sessionId);
        return;
      }

      const sessionItem = event.target.closest(".session-item[data-session-id]");
      if (!sessionItem || sessionItem.dataset.sessionId === state.currentSessionId) {
        return;
      }

      activateSession(sessionItem.dataset.sessionId, { focusMessage: true });
      closeSidebarOnMobile();
      setStatus(refs.composerStatus, "");
    });
    refs.sendButton.addEventListener("click", sendMessage);
    refs.imageButton.addEventListener("click", () => {
      refs.imageInput.click();
    });
    refs.imageInput.addEventListener("change", async () => {
      await addAttachmentsFromFiles(refs.imageInput.files);
      refs.imageInput.value = "";
    });
    refs.composerAttachments.addEventListener("click", (event) => {
      const removeButton = event.target.closest("button[data-attachment-id]");
      if (!removeButton) {
        return;
      }

      state.pendingAttachments = state.pendingAttachments.filter((attachment) => {
        return attachment.id !== removeButton.dataset.attachmentId;
      });
      renderComposerAttachments();
      setStatus(refs.composerStatus, "");
    });
    refs.logoutButton.addEventListener("click", logout);
    refs.modelTrigger.addEventListener("click", () => {
      setModelPickerOpen(refs.modelMenu.hidden);
    });
    refs.modelTrigger.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        setModelPickerOpen(refs.modelMenu.hidden);
      }
    });
    refs.modelMenu.addEventListener("click", (event) => {
      const option = event.target.closest(".model-option[data-value]");
      if (!option) {
        return;
      }

      selectModel(option.dataset.value, { closeMenu: true, focusTrigger: true });
      setStatus(refs.composerStatus, "");
    });
    refs.modelMenu.addEventListener("keydown", (event) => {
      const option = event.target.closest(".model-option[data-value]");
      if (!option) {
        return;
      }

      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        selectModel(option.dataset.value, { closeMenu: true, focusTrigger: true });
        setStatus(refs.composerStatus, "");
      }
    });
      refs.messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });
    refs.messageInput.addEventListener("input", () => {
      syncMessageInputHeight({ collapse: false });
    });
    refs.messageInput.addEventListener("focus", () => {
      syncMessageInputHeight({ collapse: false });
    });
    refs.messageInput.addEventListener("blur", () => {
      syncMessageInputHeight({ collapse: true });
    });
    refs.messageInput.addEventListener("paste", async (event) => {
      const clipboardFiles = Array.from(event.clipboardData?.files || []);
      const itemFiles = Array.from(event.clipboardData?.items || [])
        .filter((item) => item.kind === "file" && item.type.startsWith("image/"))
        .map((item) => item.getAsFile())
        .filter(Boolean);
      const files = [...clipboardFiles, ...itemFiles].filter((file) => file.type.startsWith("image/"));
      if (!files.length) {
        return;
      }

      await addAttachmentsFromFiles(files);
    });
    refs.systemPromptInput.addEventListener("input", () => {
      saveCurrentSession(false);
    });
    refs.apiKeyInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        unlock();
      }
    });
    document.addEventListener("click", (event) => {
      if (!refs.modelPicker.contains(event.target)) {
        setModelPickerOpen(false);
      }

      if (!event.target.closest(".session-menu-wrap")) {
        closeSessionMenu();
      }
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        setModelPickerOpen(false);
        setSidebarOpen(false);
        closeSessionMenu();
      }
    });
    globalThis.addEventListener("resize", () => {
      if (!isMobileViewport()) {
        setSidebarOpen(false);
      }

      syncMessageInputPlaceholder();
      syncMessageInputHeight();
      scheduleCustomScrollbarSync();
    });

    const cachedApiKey = getStoredApiKey();
    setupCustomScrollbars();
    applyTheme(resolveInitialTheme(), { persist: false });
    syncMessageInputPlaceholder();
    syncMessageInputHeight({ collapse: true });
    renderModelOptions([]);
    renderSessionList();
    renderConversationMessages([]);
    updateModelUsage();
    updateSessionSummary();

    if (cachedApiKey) {
      refs.apiKeyInput.value = cachedApiKey;
      state.apiKey = cachedApiKey;
      updateSessionSummary();
      setAuthGateVisible(false);
      unlock();
    } else {
      setAuthGateVisible(true);
    }
  </script>
